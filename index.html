<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seva Setu · same image for chatbot icon</title>

    <!-- tailwind + font awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #fff;
            font-family: Inter, sans-serif;
            overflow-x: hidden;
        }

        /* floating button — image becomes cross when chat opens */
        .floating-icon {
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 25px rgba(249, 115, 22, .4);
            transition: background 0.2s, border-color 0.2s, opacity 0.2s, visibility 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .floating-icon img,
        .floating-icon i {
            transition: opacity 0.2s, transform 0.2s;
        }

        .floating-icon .btn-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .floating-icon .btn-cross {
            font-size: 2rem;
            color: #f97316;
            display: none;
        }

        .floating-icon.active-chat .btn-image {
            display: none;
        }

        .floating-icon.active-chat .btn-cross {
            display: inline-block;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* chatbot container — fullscreen on mobile, default on desktop */
        .chatbot-container {
            transition: .3s;
            position: fixed;
            z-index: 40;
            bottom: 6rem;
            right: 1.5rem;
            width: 100%;
            max-width: 28rem;
            opacity: 0;
            transform: scale(.5);
            visibility: hidden;
            height: 0;
            overflow: hidden;
        }

        .chatbot-container.active {
            opacity: 1;
            transform: scale(1);
            visibility: visible;
            height: 90vh;
        }

        /* mobile full‑screen override */
        @media (max-width: 640px) {
            .chatbot-container {
                bottom: 0;
                right: 0;
                max-width: 100%;
                height: 0;
                border-radius: 0;
            }

            .chatbot-container.active {
                height: 100dvh;
                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
            }

            .chat-container {
                border-radius: 0;
                height: 100dvh;
                max-height: 100dvh;
            }

            .mobile-header {
                border-radius: 0;
            }

            /* hide floating button when chat is active on mobile */
            .chatbot-container.active~.fixed.bottom-6.right-6.z-50,
            .chatbot-container.active+* .fixed.bottom-6.right-6.z-50,
            body:has(.chatbot-container.active) .fixed.bottom-6.right-6.z-50 {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        }

        /* main chat */
        .chat-container {
            height: 100%;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, .3);
            overflow: hidden;
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            background: #f8f4f0;
            position: relative;
        }

        /* background image */
        .lady-background {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .lady-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
        }

        .lady-background::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, .1), rgba(0, 0, 0, .3));
        }

        .chat-container>*:not(.lady-background) {
            position: relative;
            z-index: 2;
        }

        /* header */
        .mobile-header {
            background: linear-gradient(135deg, rgba(249, 115, 22, .95), rgba(251, 146, 60, .95));
        }

        /* messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        #chat-messages {
            margin-top: auto;
        }

        /* bubbles */
        .message-bot .bg-white {
            background: rgba(255, 255, 255, .75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, .6);
        }

        .message-user .bg-orange-500 {
            background: rgba(249, 115, 22, 0.9);
        }

        /* typing */
        .typing-indicator span {
            animation: bounce 1.4s infinite;
            width: 8px;
            height: 8px;
            background: #f97316;
            border-radius: 50%;
            display: inline-block;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-8px);
            }
        }

        /* input row — icons inside the field */
        .input-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0 0.5rem;
            flex: 1;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            padding: 0.75rem 0.5rem;
            width: 100%;
            background: transparent;
        }

        .input-wrapper .input-actions {
            display: flex;
            gap: 0.5rem;
            margin-left: 0.25rem;
            flex-shrink: 0;
        }

        .input-wrapper .input-actions button i {
            color: #9ca3af;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .input-wrapper .input-actions button:hover i {
            color: #f97316;
        }

        /* send button stays outside */
        .send-btn-container {
            flex-shrink: 0;
        }

        /* bottom safe area */
        @media (max-width: 640px) {
            .p-3.border-t.bg-white {
                padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            }
        }

        /* --- fade effect for ALL messages - 3 messages keep, baaki fade --- */
        .chat-message {
            transition: opacity 0.8s ease-out;
        }

        .chat-message.fade-out {
            opacity: 0;
        }

        .chat-message.removed {
            display: none !important;
        }

        /* profile images ke liye style */
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <!-- FLOATING BUTTON : image by default, cross when active -->
    <div class="fixed bottom-6 right-6 z-50">
        <button id="toggle-chat"
            class="floating-icon w-16 h-16 rounded-full overflow-hidden border-4 border-orange-500 flex items-center justify-center bg-white">
            <img src="./image1.png" class="btn-image w-full h-full object-cover">
            <i class="fas fa-times btn-cross text-4xl"></i>
        </button>
    </div>

    <!-- CHATBOT CONTAINER -->
    <div id="chatbot-container" class="chatbot-container">
        <div class="chat-container">
            <div class="lady-background">
                <img src="./image1.png" alt="">
            </div>

            <!-- HEADER -->
            <div class="mobile-header text-white">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center">
                        <!-- header mein bhi wahi image -->
                        <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white mr-3">
                            <img src="./image1.png" class="profile-img">
                        </div>
                        <div>
                            <h2 class="font-bold">Seva Setu Assistant</h2>
                            <p class="text-xs">Consulate Info</p>
                        </div>
                    </div>
                    <button id="minimize-chat">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- MESSAGES -->
            <div class="messages-container" id="messages-scroll">
                <div id="chat-messages" class="space-y-4"></div>
                <div id="bottom-messages" class="space-y-4">
                    <!-- welcome bot - ab image use karega -->
                    <div class="chat-message message-bot flex items-start">
                        <div
                            class="w-10 h-10 rounded-full overflow-hidden border-2 border-orange-500 mr-3 flex-shrink-0">
                            <img src="./image1.png" class="profile-img">
                        </div>
                        <div class="bg-white rounded-2xl p-4 max-w-xs">
                            <p>Welcome! How can I assist you today?</p>
                        </div>
                    </div>
                </div>
                <!-- typing indicator - ab image use karega -->
                <div id="typing-indicator" class="hidden mt-4">
                    <div class="flex items-start">
                        <div
                            class="w-10 h-10 rounded-full overflow-hidden border-2 border-orange-500 mr-3 flex-shrink-0">
                            <img src="./image1.png" class="profile-img">
                        </div>
                        <div class="bg-white p-4 rounded-xl">
                            <div class="typing-indicator flex space-x-1">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- INPUT AREA : camera / paperclip / mic INSIDE input field -->
            <div class="p-3 border-t bg-white">
                <div class="flex items-center gap-2">
                    <!-- wrapper that contains input + icons inside -->
                    <div class="input-wrapper">
                        <input id="message-input" type="text" placeholder="Ask about consulate services">
                        <div class="input-actions">
                            <button id="camera-btn"><i class="fas fa-camera"></i></button>
                            <button id="attach-btn"><i class="fas fa-paperclip"></i></button>
                            <button id="audio-btn"><i class="fas fa-microphone"></i></button>
                        </div>
                    </div>
                    <!-- send button remains separate -->
                    <div class="send-btn-container">
                        <button id="send-btn" class="bg-orange-500 text-white p-3 rounded-lg">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const toggleChat = document.getElementById("toggle-chat");
            const chatbot = document.getElementById("chatbot-container");
            const minimize = document.getElementById("minimize-chat");
            const messageInput = document.getElementById("message-input");
            const sendBtn = document.getElementById("send-btn");
            const chatMessages = document.getElementById("chat-messages");
            const typingIndicator = document.getElementById("typing-indicator");
            const bottomMessages = document.getElementById("bottom-messages");

            // camera/attach/audio buttons — bas alerts
            document.getElementById("camera-btn")?.addEventListener("click", (e) => {
                e.preventDefault();
                alert("📸 Camera opened (simulated)");
            });
            document.getElementById("attach-btn")?.addEventListener("click", (e) => {
                e.preventDefault();
                alert("📎 Attach file (simulated)");
            });
            document.getElementById("audio-btn")?.addEventListener("click", (e) => {
                e.preventDefault();
                alert("🎤 Voice recording will start");
            });

            let isOpen = false;
            let firstMessageSent = false;

            // toggle chat + switch icon image/cross
            function toggleChatPanel() {
                isOpen = !isOpen;
                chatbot.classList.toggle("active", isOpen);
                toggleChat.classList.toggle("active-chat", isOpen);
            }

            toggleChat.onclick = (e) => {
                e.preventDefault();
                toggleChatPanel();
            };

            minimize.onclick = () => {
                isOpen = false;
                chatbot.classList.remove("active");
                toggleChat.classList.remove("active-chat");
            };

            // scroll to bottom
            function scrollBottom() {
                const scroll = document.getElementById("messages-scroll");
                scroll.scrollTop = scroll.scrollHeight;
            }

            // --- SAB MESSAGES FADE HONGE - 3 MESSAGES KEEP HONGE ---
            function fadeOldMessages() {
                // saare messages lo jo direct #chat-messages ke andar hain (class chat-message wale)
                const allMessages = Array.from(document.querySelectorAll('#chat-messages > .chat-message'));

                // 3 se zyada messages hain to purane fade karo (3 messages rehne do)
                if (allMessages.length > 3) {
                    // sabse purane messages (first n-3)
                    const messagesToFade = allMessages.slice(0, allMessages.length - 3);

                    messagesToFade.forEach(msg => {
                        // agar already fade ho raha hai ya remove ho chuka hai to skip
                        if (msg.classList.contains('fade-out') || msg.classList.contains('removed')) return;

                        // fade-out class add karo - isse opacity 0 ho jayegi
                        msg.classList.add('fade-out');

                        // transition end hone ke baad display: none kar do
                        const onFadeEnd = function (e) {
                            if (e.propertyName === 'opacity') {
                                msg.classList.add('removed');
                                msg.removeEventListener('transitionend', onFadeEnd);
                            }
                        };
                        msg.addEventListener('transitionend', onFadeEnd, { once: true });

                        // backup timer agar transitionend fire na ho
                        setTimeout(() => {
                            if (msg.classList.contains('fade-out') && !msg.classList.contains('removed')) {
                                msg.classList.add('removed');
                            }
                        }, 1000);
                    });
                }
            }

            // message add karne ka function - ab image ke saath
            function addMessage(text, user) {
                const messageWrapper = document.createElement("div");

                if (user) {
                    // user message - right side, orange background, user icon (i class="fas fa-user")
                    messageWrapper.className = 'chat-message message-user';
                    messageWrapper.innerHTML = `
                        <div class="flex items-start flex-row-reverse">
                            <div class="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center ml-3 flex-shrink-0">
                                <i class="fas fa-user text-white text-xl"></i>
                            </div>
                            <div class="bg-orange-500 text-white rounded-2xl p-4 max-w-xs">
                                ${text}
                            </div>
                        </div>
                    `;
                } else {
                    // bot message - left side, white background, image profile
                    messageWrapper.className = 'chat-message message-bot';
                    messageWrapper.innerHTML = `
                        <div class="flex items-start">
                            <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-orange-500 mr-3 flex-shrink-0">
                                <img src="./image1.png" class="profile-img">
                            </div>
                            <div class="bg-white rounded-2xl p-4 max-w-xs">
                                ${text}
                            </div>
                        </div>
                    `;
                }

                chatMessages.appendChild(messageWrapper);
                scrollBottom();
            }

            // send message logic
            function sendMessage() {
                const text = messageInput.value.trim();
                if (text === "") return;

                // pehla message bheja to bottom messages ko main chat me move karo
                if (!firstMessageSent) {
                    while (bottomMessages.firstChild) {
                        const node = bottomMessages.firstChild;
                        chatMessages.appendChild(node);
                    }
                    firstMessageSent = true;
                }

                // user message add karo
                addMessage(text, true);
                messageInput.value = "";

                // naya message add karne ke baad purane messages fade karo
                setTimeout(() => {
                    fadeOldMessages();
                }, 20);

                // typing indicator dikhao
                typingIndicator.classList.remove("hidden");
                scrollBottom();

                // bot ka reply
                setTimeout(() => {
                    typingIndicator.classList.add("hidden");
                    addMessage("Thank you. An officer will respond shortly.", false);

                    // bot reply ke baad bhi fade karo
                    setTimeout(() => {
                        fadeOldMessages();
                    }, 20);
                }, 1200);
            }

            sendBtn.onclick = sendMessage;

            messageInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") sendMessage();
            });

        })();
    </script>

</body>

</html>
